#categorize: "./release-notes-assistant.sh"
branch-development: "main"
branch-pattern: "v*"
branch-find-version: "v(?P<version>\\d+\\.\\d+\\.\\d+)"
branch-to-version: "${version}"
branch-from-version: "v%[1]d.%[2]d.%[3]d"
tag-from-version: "v%[1]d.%[2]d.%[3]d"
supported-release-count: 3
render-header: |
  ## What's Changed
render-footer: |
  *This list was auto-generated by [release-notes-assistant](https://code.forgejo.org/forgejo/release-notes-assistant).*
